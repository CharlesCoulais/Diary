[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && rm -rf apps/web/dist apps/api/dist && pnpm build:prod"

[deploy]
startCommand = "pnpm --filter @carnet/api db:deploy && node apps/api/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
